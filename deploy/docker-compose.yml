# Flow MVP (Vaihe 1) self-host stack. Designed for a Tailscale-internal Studio /
# VPS. Three long-lived services + Postgres; the untrusted per-run orchestrator
# containers are launched on demand by flow-runner (NOT declared here) with the
# §11.1 hardening flags.
#
# Secrets (runner token, GitHub token, Claude credential) are provided via env /
# Docker secrets at deploy time — never committed. See .env.example.

name: flow

services:
  postgres:
    image: postgres:16
    restart: always
    environment:
      POSTGRES_USER: flow
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: flow
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flow"]
      interval: 5s
      timeout: 3s
      retries: 10

  flowd:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.flowd
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      FLOWD_ADDR: ":8080"
      FLOW_DATABASE_URL: "postgres://flow:${POSTGRES_PASSWORD:?}@postgres:5432/flow?sslmode=disable"
      FLOW_BOOTSTRAP_TENANT: ${FLOW_BOOTSTRAP_TENANT:-default}
      # §7: promote this GitHub login to admin in the bootstrap tenant at startup.
      FLOW_BOOTSTRAP_ADMIN: ${FLOW_BOOTSTRAP_ADMIN:-}
      FLOW_GITHUB_TOKEN: ${FLOW_GITHUB_TOKEN:-}
      FLOW_SCAN_INTERVAL: ${FLOW_SCAN_INTERVAL:-60s}
      # §7(a) device flow for `flowctl login`. Empty => /v1/auth/device/* returns 503.
      FLOW_GITHUB_OAUTH_CLIENT_ID: ${FLOW_GITHUB_OAUTH_CLIENT_ID:-}
      # §7.3 GitHub App token broker (push/PR auth, #34 model C). Empty broker
      # token => GET /v1/github-app/token returns 503 (fail-closed). The four
      # APP_* vars env-bootstrap one (tenant, org) -> installation row at startup;
      # PRIVATE_KEY_REF names the env var holding the PEM (resolved at mint time).
      FLOW_BROKER_TOKEN: ${FLOW_BROKER_TOKEN:-}
      FLOW_GITHUB_APP_ORG: ${FLOW_GITHUB_APP_ORG:-}
      FLOW_GITHUB_APP_ID: ${FLOW_GITHUB_APP_ID:-}
      FLOW_GITHUB_APP_INSTALLATION_ID: ${FLOW_GITHUB_APP_INSTALLATION_ID:-}
      FLOW_GITHUB_APP_PRIVATE_KEY_REF: ${FLOW_GITHUB_APP_PRIVATE_KEY_REF:-}
      FLOW_GITHUB_APP_KEY_DEFAULT: ${FLOW_GITHUB_APP_KEY_DEFAULT:-}
    ports:
      - "8080:8080"
    networks:
      # default for the rest of the stack; flow-egress so the per-run orchestrator
      # containers (attached only to flow-egress) can reach the central directly
      # for run config + telemetry, bypassing the egress allow-list proxy via
      # NO_PROXY (set by internal/runnerexec). Central traffic is trusted internal.
      - default
      - flow-egress

  # The runner-host egress proxy (§11.2): default-deny allow-list. The per-run
  # orchestrator containers attach ONLY to flow-egress and route out through here.
  egress-proxy:
    # Custom image: ubuntu/squid + iptables/ipset, with the §11.2 firewall and
    # config baked in. The stock ubuntu/squid image lacks the firewall tooling
    # and its entrypoint treats `command` as squid args, so it cannot run the
    # allow-list itself — see deploy/Dockerfile.egress.
    build:
      context: ..
      dockerfile: deploy/Dockerfile.egress
    restart: always
    cap_add:
      - NET_ADMIN # required to program the iptables/ipset firewall
    volumes:
      # Shared with flow-runner so the §11.6 shipper can tail access.log.
      - egress-log:/var/log/squid
    networks:
      - default
      - flow-egress
    # Firewall init + squid launch are baked into the image entrypoint
    # (firewall runs before squid; egress logging -> §11.6).

  flow-runner:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.runner
    restart: always
    depends_on:
      - flowd
      - egress-proxy
    environment:
      FLOW_CENTRAL_URL: "http://flowd:8080"
      FLOW_RUNNER_TOKEN: ${FLOW_RUNNER_TOKEN:-}
      # The trusted host fetches the issue body/comments before dispatch (it holds
      # the GitHub token; the container never does, §11.3). Without this the issue
      # fetch is anonymous -> 404 on private repos -> the agent gets an empty task.
      FLOW_GITHUB_TOKEN: ${FLOW_GITHUB_TOKEN:-}
      # DooD: the runner shells out to the HOST docker daemon, so per-run worktree
      # bind-mounts must resolve as HOST paths. Point the repo root at the work dir
      # mounted at its host-absolute path (see volumes), not the in-container /work.
      FLOW_REPO_ROOT: ${FLOW_WORK_DIR:?set FLOW_WORK_DIR to host abs path of deploy/work}/repo
      FLOW_POLL_INTERVAL: ${FLOW_POLL_INTERVAL:-15s}
      # Container dispatch (§11.1): "container" launches each run inside a
      # hardened ephemeral flow-orchestrator container; "inproc" keeps the
      # orchestration in the runner process (dev default).
      FLOW_RUNNER_MODE: ${FLOW_RUNNER_MODE:-container}
      FLOW_ORCHESTRATOR_IMAGE: ${FLOW_ORCHESTRATOR_IMAGE:-flow-orchestrator:latest}
      FLOW_RUNNER_NAME: ${FLOW_RUNNER_NAME:-}
      FLOW_CLAUDE_CRED_PATH: ${FLOW_CLAUDE_CRED_PATH:-}
      # The Debian docker.io CLI speaks API 1.41; the host daemon (Docker 29)
      # requires >= 1.44. Pin the API version so the runner's `docker run`
      # dispatch to the host daemon negotiates a supported version.
      DOCKER_API_VERSION: "1.44"
      # NOTE: the runner is a TRUSTED host process. Its own git push / gh pr create
      # (§11.3 model C, decision 19) must reach github.com DIRECTLY with the broker
      # token — NOT through the egress allow-list proxy (which is for the UNTRUSTED
      # orchestrator container only, injected separately by internal/runnerexec).
      # Setting HTTPS_PROXY here routed the trusted push through squid -> 503. The
      # runner reaches the central via the internal network; no proxy needed.
      # §11.6: shipper tails squid's access.log out of the shared volume.
      FLOW_EGRESS_LOG: /var/log/squid/access.log
    volumes:
      # The runner launches per-run containers via the host Docker daemon. The
      # daemon is trusted; the UNTRUSTED orchestrator containers never get the
      # socket (§11.1 invariant).
      - /var/run/docker.sock:/var/run/docker.sock
      # DooD: mount the work dir at the SAME absolute path inside the runner as on
      # the host, so the worktree path the runner hands to `docker run -v` (for the
      # per-run orchestrator container) resolves on the host daemon. FLOW_WORK_DIR
      # is the host-absolute path to deploy/work.
      - ${FLOW_WORK_DIR:?set FLOW_WORK_DIR to host abs path of deploy/work}:${FLOW_WORK_DIR}
      # Read squid's access.log out of the same named volume the proxy writes.
      - egress-log:/var/log/squid:ro

  dashboard:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.dashboard
    restart: always
    depends_on:
      - flowd
    environment:
      FLOW_CENTRAL_URL: "http://flowd:8080"
    ports:
      - "8090:8090"

networks:
  # Isolated network the untrusted per-run containers attach to; the only route
  # out is the egress proxy. Fixed `name` (no compose project prefix) so the
  # runner's `docker run --network flow-egress` (internal/runnerexec) resolves —
  # otherwise compose names it `<project>_flow-egress` and dispatch fails.
  flow-egress:
    name: flow-egress
    internal: false

volumes:
  # Shared between egress-proxy (writer) and flow-runner (reader). Keeps the
  # squid access.log on a Docker-managed volume rather than a host bind-mount.
  egress-log:
