# Minimal Squid config for the Flow egress proxy (§11.2/§11.6).
#
# The hard allow-list is enforced by init-firewall.sh (ipset/iptables
# default-deny). Squid here provides the HTTPS_PROXY endpoint the orchestrator
# containers point at, plus the per-connection access log that surfaces
# {host, allowed|denied} to the dashboard (§11.6). Credential header-injection
# (§11.3) is a later refinement; in Vaihe 1 the proxy is the egress gate +
# log, and the runner's git operations carry their own gh auth scoped by the
# GitHub App permission (R3c: App-scope + branch protection).

http_port 3128

# Domains the firewall also allows; kept in sync with init-firewall.sh.
acl allowed_dstdomain dstdomain .github.com .githubusercontent.com
acl allowed_dstdomain dstdomain registry.npmjs.org repo.packagist.org api.anthropic.com
acl CONNECT method CONNECT
acl SSL_ports port 443

http_access allow CONNECT SSL_ports allowed_dstdomain
http_access allow allowed_dstdomain
http_access deny all

# §11.6 egress log: one line per request with the result code (TCP_DENIED for
# blocked). A log-shipper tails this into the egress_log table.
access_log /var/log/squid/access.log squid
